<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>行车记录仪</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%; overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", Roboto, sans-serif;
  background: #000; color: #fff;
  user-select: none; -webkit-user-select: none;
}
.container {
  display: flex; flex-direction: column;
  height: 100dvh; width: 100vw;
}
.camera-area {
  height: 35vh; flex-shrink: 0; position: relative; overflow: hidden;
  background: #111;
}
.camera-area video, .camera-area canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; object-fit: cover;
}
.camera-area video { display: none; }
.camera-label {
  position: absolute; top: 10px; left: 12px; z-index: 2;
  font-size: 13px; font-weight: 600;
  background: rgba(0,0,0,.55); padding: 3px 10px; border-radius: 10px;
  pointer-events: none;
}
.camera-flip {
  position: absolute; top: 40px; left: 12px; z-index: 2;
  font-size: 16px; cursor: pointer;
  background: rgba(0,0,0,.55); width: 30px; height: 30px;
  border-radius: 50%; border: none; color: #fff;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.camera-flip:active { background: rgba(255,255,255,.25); }
.rec-indicator {
  position: absolute; top: 10px; right: 12px; z-index: 2;
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
  background: rgba(0,0,0,.55); padding: 3px 10px; border-radius: 10px;
  pointer-events: none;
}
.rec-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #ff3b30;
  display: none;
}
.rec-dot.active { display: inline-block; animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: .3; } }

.clock-area {
  flex: 1; display: flex; flex-direction: column;
  background: #000; padding: 8px 20px 0;
}
.clock-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
}
.clock-display {
  font-size: 96px; font-weight: 800;
  font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: 6px;
}
.clock-date {
  font-size: 13px; opacity: .45; margin-bottom: 6px;
}
.speed-row {
  display: flex; align-items: baseline; justify-content: center; gap: 5px;
}
.speed-value {
  font-size: 48px; font-weight: 800;
  font-variant-numeric: tabular-nums; line-height: 1.1; letter-spacing: -1px;
}
.speed-unit { font-size: 18px; font-weight: 300; opacity: .55; }
.gps-info {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; opacity: .55; margin-top: 4px; flex-wrap: wrap; justify-content: center;
}
.gps-status { display: flex; align-items: center; gap: 5px; }
.gps-dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0;
}
.gps-dot.ok { background: #34c759; }
.gps-dot.err { background: #ff3b30; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: .3; } }
.rec-time {
  font-size: 13px; font-weight: 600;
  font-variant-numeric: tabular-nums; opacity: .7; min-width: 48px; text-align: right;
}
.actions-area {
  flex-shrink: 0; padding: 14px 0 24px;
  display: flex; gap: 12px; align-items: center; justify-content: center;
}
.btn-photo, .btn-record {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  border: none; cursor: pointer; font-weight: 600;
  transition: all .15s; flex: 1; max-width: 200px;
}
.btn-photo {
  padding: 14px; border-radius: 14px;
  background: linear-gradient(135deg, #1a84ff, #0d5ed4);
  color: #fff; font-size: 17px;
}
.btn-photo:active { transform: scale(.96); opacity: .85; }
.btn-photo .icon { font-size: 20px; }
.btn-record { padding: 14px; border-radius: 14px; font-size: 15px; }
.btn-record.recording { background: #ff3b30; color: #fff; }
.btn-record.stopped { background: rgba(255,255,255,.12); color: #fff; }
.btn-record:active { transform: scale(.96); }
.record-icon {
  width: 10px; height: 10px; border-radius: 50%;
  background: currentColor; transition: border-radius .3s; flex-shrink: 0;
}
.btn-record.recording .record-icon { border-radius: 2px; }
@media (orientation: landscape) {
  .container { flex-direction: row; }
  .camera-area { height: 100%; width: 65vw; flex: none; }
  .clock-area { height: 100%; width: 35vw; flex: none; padding: 10px 14px 0; }
  .clock-content { justify-content: center; }
  .clock-display { font-size: 72px; letter-spacing: 4px; }
  .speed-value { font-size: 36px; }
}
.toast {
  position: fixed; bottom: 120px; left: 16px; right: 16px; z-index: 9999;
  background: rgba(0,0,0,.85); color: #fff; font-size: 13px;
  padding: 12px 16px; border-radius: 12px;
  text-align: center; line-height: 1.4; word-break: break-all;
  transition: opacity .3s;
}
.toast.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div class="container">
  <div class="camera-area" id="cameraArea">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div class="camera-label">⏺ 行车记录</div>
    <button class="camera-flip" id="flipBtn">🔄</button>
    <div class="rec-indicator">
      <span class="rec-dot" id="recDot"></span>
      <span id="recIndicator">待机</span>
    </div>
  </div>
  <div class="clock-area">
    <div class="clock-content">
      <div class="clock-display" id="clockDisplay">00:00</div>
      <div class="clock-date" id="clockDate">----</div>
      <div class="speed-row">
        <span class="speed-value" id="speedDisplay">0</span>
        <span class="speed-unit">km/h</span>
      </div>
      <div class="gps-info">
        <div class="gps-status">
          <span class="gps-dot err" id="gpsDot"></span>
          <span id="gpsText">定位中...</span>
        </div>
        <span id="latDisplay">--</span>
        <span id="lngDisplay">--</span>
        <span class="rec-time" id="recTime">00:00</span>
      </div>
    </div>
    <div class="actions-area">
      <button class="btn-photo" id="photoBtn">
        <span class="icon">📸</span> 拍照
      </button>
      <button class="btn-record stopped" id="recordBtn">
        <span class="record-icon"></span>
        <span id="recordLabel">开始录像</span>
      </button>
      <button class="btn-record stopped" id="exitBtn" style="flex:0.4;max-width:60px;font-size:13px;background:rgba(255,255,255,.08)">
        ✕
      </button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
var video = document.getElementById('video');
var canvas = document.getElementById('overlayCanvas');
var ctx = canvas.getContext('2d');
var clockDisplay = document.getElementById('clockDisplay');
var clockDate = document.getElementById('clockDate');
var speedDisplay = document.getElementById('speedDisplay');
var gpsDot = document.getElementById('gpsDot');
var gpsText = document.getElementById('gpsText');
var latDisplay = document.getElementById('latDisplay');
var lngDisplay = document.getElementById('lngDisplay');
var recTime = document.getElementById('recTime');
var recordBtn = document.getElementById('recordBtn');
var recordLabel = document.getElementById('recordLabel');
var photoBtn = document.getElementById('photoBtn');
var flipBtn = document.getElementById('flipBtn');
var exitBtn = document.getElementById('exitBtn');
var recDot = document.getElementById('recDot');
var recIndicator = document.getElementById('recIndicator');
var toast = document.getElementById('toast');

var watchId = null;
var toastTimer = null;
var recording = false;
var recStartTime = null;
var recTimer = null;
var currentLat = 0;
var currentLng = 0;
var currentSpeed = 0;
var mediaRecorder = null;
var recordedChunks = [];
var canvasStream = null;
var audioTrack = null;
var animFrameId = null;
var useFrontCamera = false;
var serverBase = 'http://127.0.0.1:' + (window.Android ? Android.getServerPort() : 0);
var cameraStarted = false;

function showToast(msg, duration) {
  if (toastTimer) clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.remove('hidden');
  toastTimer = setTimeout(function () { toast.classList.add('hidden'); }, duration || 5000);
}

// ========== GPS ==========
function startGPS() {
  if (!navigator.geolocation) {
    gpsText.textContent = '不支持GPS';
    gpsDot.className = 'gps-dot err';
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    function (pos) {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      var s = pos.coords.speed;
      currentSpeed = (s !== null && s >= 0) ? Math.round(s * 3.6) : 0;
      speedDisplay.textContent = currentSpeed;
      var gcj = wgs84ToGcj02(currentLat, currentLng);
      latDisplay.textContent = gcj.lat.toFixed(6);
      lngDisplay.textContent = gcj.lng.toFixed(6);
      gpsDot.className = 'gps-dot ok';
      gpsText.textContent = 'GPS 已定位';
    },
    function () {
      gpsDot.className = 'gps-dot err';
      gpsText.textContent = '定位失败';
    },
    { enableHighAccuracy: true, maximumAge: 1000 }
  );
}

// ========== Coordinate transform ==========
var GCJ_PI = 3.1415926535897932384626;
var GCJ_A = 6378245.0;
var GCJ_EE = 0.00669342162296594323;

function gcjTransformLat(x, y) {
  var ret = -100 + 2 * x + 3 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
  ret += (20 * Math.sin(6 * x * GCJ_PI) + 20 * Math.sin(2 * x * GCJ_PI)) * 2 / 3;
  ret += (20 * Math.sin(y * GCJ_PI) + 40 * Math.sin(y / 3 * GCJ_PI)) * 2 / 3;
  ret += (160 * Math.sin(y / 12 * GCJ_PI) + 320 * Math.sin(y * GCJ_PI / 30)) * 2 / 3;
  return ret;
}
function gcjTransformLng(x, y) {
  var ret = 300 + x + 2 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
  ret += (20 * Math.sin(6 * x * GCJ_PI) + 20 * Math.sin(2 * x * GCJ_PI)) * 2 / 3;
  ret += (20 * Math.sin(x * GCJ_PI) + 40 * Math.sin(x / 3 * GCJ_PI)) * 2 / 3;
  ret += (150 * Math.sin(x / 12 * GCJ_PI) + 300 * Math.sin(x / 30 * GCJ_PI)) * 2 / 3;
  return ret;
}
function wgs84ToGcj02(wgsLat, wgsLng) {
  var dlat = gcjTransformLat(wgsLng - 105, wgsLat - 35);
  var dlng = gcjTransformLng(wgsLng - 105, wgsLat - 35);
  var radlat = wgsLat / 180 * GCJ_PI;
  var magic = Math.sin(radlat);
  magic = 1 - GCJ_EE * magic * magic;
  var sqrtmagic = Math.sqrt(magic);
  dlat = (dlat * 180) / ((GCJ_A * (1 - GCJ_EE)) / (magic * sqrtmagic) * GCJ_PI);
  dlng = (dlng * 180) / (GCJ_A / sqrtmagic * Math.cos(radlat) * GCJ_PI);
  return { lat: wgsLat + dlat, lng: wgsLng + dlng };
}

// ========== Clock ==========
function updateClock() {
  var now = new Date();
  clockDisplay.textContent =
    String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  var dow = ['日','一','二','三','四','五','六'][now.getDay()];
  clockDate.textContent = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日 周' + dow;
}

// ========== Camera ==========
async function startCamera() {
  try {
    var constraints = {
      video: { facingMode: useFrontCamera ? 'user' : 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: true
    };
    var stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    audioTrack = stream.getAudioTracks()[0];

    video.onloadedmetadata = function () {
      resizeCanvas();
      startCanvasLoop();
      cameraStarted = true;
      if (!recording) {
        setTimeout(autoRecord, 1000);
      }
    };
  } catch (e) {
    showToast('摄像头启动失败: ' + e.message);
  }
}

function resizeCanvas() {
  var rect = document.getElementById('cameraArea').getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

// ========== Canvas overlay drawing ==========
function startCanvasLoop() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  draw();
}

function draw() {
  var cw = canvas.width, ch = canvas.height;

  // Draw camera frame
  if (video.videoWidth) {
    ctx.drawImage(video, 0, 0, cw, ch);
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, cw, ch);
  }

  // Overlay: timestamp
  var now = new Date();
  var timeStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');

  // Draw overlay on canvas
  ctx.shadowColor = 'rgba(0,0,0,.6)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;

  // Top-left: label + timestamp
  ctx.font = 'bold ' + Math.round(ch * 0.035) + 'px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.fillRect(0, 0, cw * 0.7, ch * 0.085);
  ctx.fillStyle = '#fff';
  ctx.fillText('⏺ 行车记录  ' + timeStr, cw * 0.02, ch * 0.06);

  // Bottom-left: GPS + speed
  var gcj = wgs84ToGcj02(currentLat, currentLng);
  var latStr = currentLat ? gcj.lat.toFixed(6) : '--';
  var lngStr = currentLng ? gcj.lng.toFixed(6) : '--';
  var overlayBottom = 'GPS: ' + latStr + ', ' + lngStr + '   ' + currentSpeed + ' km/h';

  ctx.font = Math.round(ch * 0.028) + 'px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.fillRect(0, ch - ch * 0.075, cw * 0.95, ch * 0.075);
  ctx.fillStyle = '#fff';
  ctx.fillText(overlayBottom, cw * 0.02, ch - ch * 0.02);

  // Top-right: recording time
  if (recording && recStartTime) {
    var sec = Math.floor((Date.now() - recStartTime) / 1000);
    var recStr = String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0');
    ctx.font = 'bold ' + Math.round(ch * 0.038) + 'px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(cw - cw * 0.15, 0, cw * 0.15, ch * 0.075);
    ctx.fillStyle = '#ff3b30';
    ctx.fillText('⏺ ' + recStr, cw - cw * 0.02, ch * 0.06);
    ctx.textAlign = 'left';
  }

  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  animFrameId = requestAnimationFrame(draw);
}

// ========== Recording ==========
function startRecording() {
  if (recording || !cameraStarted) return;
  if (!audioTrack) { showToast('❌ 无音频轨道'); return; }

  try {
    canvasStream = canvas.captureStream(30);
    var canvasVideoTrack = canvasStream.getVideoTracks()[0];
    var combinedStream = new MediaStream([canvasVideoTrack, audioTrack]);

    recordedChunks = [];
    mediaRecorder = new MediaRecorder(combinedStream, {
      mimeType: 'video/webm;codecs=h264' // fallback handled below
    });

    // Fallback mimeType
    if (!MediaRecorder.isTypeSupported('video/webm;codecs=h264')) {
      var supported = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
      for (var i = 0; i < supported.length; i++) {
        if (MediaRecorder.isTypeSupported(supported[i])) {
          mediaRecorder = new MediaRecorder(combinedStream, { mimeType: supported[i] });
          break;
        }
      }
      if (!mediaRecorder) mediaRecorder = new MediaRecorder(combinedStream);
    }

    mediaRecorder.ondataavailable = function (e) {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = function () {
      saveRecording();
      mediaRecorder = null;
      if (canvasStream) {
        canvasStream.getTracks().forEach(function (t) { t.stop(); });
        canvasStream = null;
      }
    };

    mediaRecorder.start(1000);
    recording = true;
    recStartTime = Date.now();
    if (!recTimer) recTimer = setInterval(updateRecTime, 200);
    recordBtn.className = 'btn-record recording';
    recordLabel.textContent = '停止录像';
    recDot.classList.add('active');
    recIndicator.textContent = '⏺ 录像中';
    showToast('⏺ 开始录像');
  } catch (e) {
    showToast('❌ 录像启动失败: ' + e.message);
  }
}

function stopRecording() {
  if (!recording || !mediaRecorder) return;
  if (mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  recording = false;
  clearInterval(recTimer); recTimer = null;
  recStartTime = null;
  recTime.textContent = '00:00';
  recordBtn.className = 'btn-record stopped';
  recordLabel.textContent = '开始录像';
  recDot.classList.remove('active');
  recIndicator.textContent = '待机';
}

function toggleRecord() {
  if (recording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function updateRecTime() {
  if (!recStartTime) return;
  var sec = Math.floor((Date.now() - recStartTime) / 1000);
  recTime.textContent =
    String(Math.floor(sec / 60)).padStart(2, '0') + ':' + String(sec % 60).padStart(2, '0');
  if (sec >= 60) {
    autoRestart();
  }
}

function autoRestart() {
  if (!recording) return;
  stopRecording();
  setTimeout(startRecording, 500);
}

function saveRecording() {
  if (recordedChunks.length === 0) { showToast('❌ 录像为空'); return; }
  var blob = new Blob(recordedChunks, { type: mediaRecorder ? mediaRecorder.mimeType : 'video/webm' });
  recordedChunks = [];

  var ts = new Date();
  var fileName = 'dashcam_' +
    ts.getFullYear() + String(ts.getMonth()+1).padStart(2,'0') + String(ts.getDate()).padStart(2,'0') + '_' +
    String(ts.getHours()).padStart(2,'0') + String(ts.getMinutes()).padStart(2,'0') + String(ts.getSeconds()).padStart(2,'0') +
    '.webm';

  var cfg = getSaveConfig();

  var xhr = new XMLHttpRequest();
  xhr.open('POST', serverBase + '/saveFile', true);
  xhr.setRequestHeader('X-File-Name', encodeURIComponent(fileName));
  xhr.setRequestHeader('X-File-Type', 'video/webm');
  xhr.setRequestHeader('X-Dir-Type', cfg.dirType);
  xhr.setRequestHeader('X-Sub-Dir', encodeURIComponent(cfg.subDir));
  xhr.onload = function () {
    if (xhr.status === 200 && xhr.responseText !== 'ERROR') {
      showToast('✅ 录像已保存: ' + xhr.responseText);
    } else {
      showToast('❌ 保存失败');
    }
  };
  xhr.onerror = function () { showToast('❌ 保存网络错误'); };
  xhr.send(blob);
}

// ========== Photo ==========
function takePhoto() {
  if (!cameraStarted) { showToast('❌ 摄像头未就绪'); return; }
  var ts = new Date();
  var fileName = 'photo_' +
    ts.getFullYear() + String(ts.getMonth()+1).padStart(2,'0') + String(ts.getDate()).padStart(2,'0') + '_' +
    String(ts.getHours()).padStart(2,'0') + String(ts.getMinutes()).padStart(2,'0') + String(ts.getSeconds()).padStart(2,'0') +
    '.jpg';

  canvas.toBlob(function (blob) {
    if (!blob) { showToast('❌ 拍照失败'); return; }
    var cfg = getSaveConfig();

    var xhr = new XMLHttpRequest();
    xhr.open('POST', serverBase + '/saveFile', true);
    xhr.setRequestHeader('X-File-Name', encodeURIComponent(fileName));
    xhr.setRequestHeader('X-File-Type', 'image/jpeg');
    xhr.setRequestHeader('X-Dir-Type', 'PICTURES');
    xhr.setRequestHeader('X-Sub-Dir', encodeURIComponent(cfg.subDir));
    xhr.onload = function () {
      if (xhr.status === 200 && xhr.responseText !== 'ERROR') {
        showToast('📸 照片已保存: ' + xhr.responseText);
      } else {
        showToast('❌ 照片保存失败');
      }
    };
    xhr.onerror = function () { showToast('❌ 保存网络错误'); };
    xhr.send(blob);
  }, 'image/jpeg', 0.9);
}

// ========== Settings ==========
var savedConfig = null;
function getSaveConfig() {
  if (savedConfig) return savedConfig;
  var dirType = 'MOVIES', subDir = 'Dashcam';
  try { dirType = localStorage.getItem('dashcam_dirType') || 'MOVIES'; } catch (e) {}
  try { subDir = localStorage.getItem('dashcam_subDir') || 'Dashcam'; } catch (e) {}
  savedConfig = { dirType: dirType, subDir: subDir };
  return savedConfig;
}

// ========== Auto record ==========
function autoRecord() {
  if (!cameraStarted || recording) return;
  startRecording();
}

// ========== Switch camera ==========
async function switchCamera() {
  if (recording) stopRecording();
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(function (t) { t.stop(); });
    audioTrack = null;
  }
  useFrontCamera = !useFrontCamera;
  cameraStarted = false;
  await startCamera();
}

// ========== Exit ==========
function exitApp() {
  if (window.Android) {
    stopRecording();
    Android.closeApp();
  }
}

// ========== Init ==========
try {
  recordBtn.addEventListener('click', toggleRecord);
  photoBtn.addEventListener('click', takePhoto);
  exitBtn.addEventListener('click', exitApp);
  if (flipBtn) flipBtn.addEventListener('click', switchCamera);
  startGPS();
  updateClock();
  setInterval(updateClock, 1000);
  startCamera();
} catch (e) {
  console.error('Init error:', e);
}
</script>
</body>
</html>
